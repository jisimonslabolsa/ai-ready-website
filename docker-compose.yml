version: '3.8'

services:
  ai-ready-website:
    image: ai-ready-website:latest   # o tu registry path
    container_name: ai-ready-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FIRECRAWL_API_KEY=fc-xxxxxxxxxxxx
      - OPENAI_API_KEY=sk-xxxxxxxxxxxx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
