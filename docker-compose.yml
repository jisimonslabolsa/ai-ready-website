version: '3.8'

services:
  ai-ready-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-ready-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
